<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Réserver un terrain - Padel Club</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

  <main class="main">

    <!-- ======= Hero Section ======= -->
    <section id="hero" class="hero section" style="padding: 80px 0;">

      <div class="container">
        <div class="row gy-4 align-items-center">
          <div class="col-lg-6">
            <h1>Réserve ton terrain de Padel 🎾</h1>
            <p>Choisis ton créneau, ton terrain et viens jouer avec tes amis !</p>
          </div>

          <div class="col-lg-6 text-center">
            <img src="assets/img/padel/padel2.jpg" alt="Réservation terrain Padel" class="img-fluid" style="border-radius: 8px;">
          </div>
        </div>
      </div>
    </section>
    <!-- End Hero Section -->

    <!-- ======= Reservation Form ======= -->
    <section class="container" style="margin-top: 40px; margin-bottom: 60px;">
      <h2>Formulaire de réservation</h2>
      <p>Remplis les informations ci-dessous pour réserver ton terrain.</p>

      <form class="row g-3" style="margin-top: 20px;">
        <div class="col-md-6">
          <label class="form-label">Choix du terrain</label>
          <select class="form-select">
            <option value="" selected disabled>-- Sélectionne un terrain --</option>
            <option>Terrain 1 - Indoor</option>
            <option>Terrain 2 - Indoor</option>
            <option>Terrain 3 - Outdoor</option>
            <option>Terrain 4 - Outdoor</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label">Heure</label>
          <input type="time" class="form-control">
        </div>

        <div class="col-md-12">
          <button type="submit" class="btn btn-primary mt-3">Réserver maintenant</button>
        </div>
      </form>
    </section>
    <!-- End Reservation Form -->

  </main>

  <!-- Main JS -->
  <script src="assets/js/main.js"></script>

</body>
</html>
